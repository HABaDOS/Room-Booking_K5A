<!DOCTYPE html>
<html>
<head>
<title>Room Booking K5A</title>
</head>

<body>

<div id="content" style="display:none;">

<h1>Room Booking K5A</h1>
<p>Romoversikt kommer her.</p>

</div>

  <h2>Romoversikt</h2>

<div class="room">
  <h3>Oslo 1</h3>
  <p>Status: Ledig</p>
  <button>Book rom</button>
</div>

<div class="room">
  <h3>Oslo 2</h3>
  <p>Status: Ledig</p>
  <button>Book rom</button>
</div>

<div class="room">
  <h3>Styret</h3>
  <p>Status: Ledig</p>
  <button>Book rom</button>
</div>
  
<script>

if(localStorage.getItem("access") === "yes"){
  document.getElementById("content").style.display = "block";
}
else{
  let kode = prompt("Skriv tilgangskode");

  if(kode === "K5A"){
    localStorage.setItem("access","yes");
    document.getElementById("content").style.display = "block";
  }
  else{
    document.body.innerHTML = "Ingen tilgang";
  }
}

</script>

</body>
</html>

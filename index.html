<!DOCTYPE html>
<html>
<head>
<title>Room Booking K5A</title>

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>


<style>

body {
  margin: 0;
  font-family: Arial;
}

.header {
  background: #2a8fb0;
  color: white;
  padding: 15px;
  text-align: center;
}

.top-links {
  background: #1f5d75;
  color: white;
  padding: 10px;
  text-align: center;
}

.main {
  display: flex;
  height: calc(100vh - 100px);
}

.sidebar {
  width: 200px;
  background: #4fa52b;
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.content-area {
  flex: 1;
  padding: 10px;
  background: #e76f2e;
  display: flex;
  flex-direction: column;
}

.calendar-actions {
  background: #e76f2e;
  padding: 10px;
  margin-bottom: 10px;
}

#calendar {
  background: white;
  flex: 1;
}

.sidebar button {
  padding: 10px;
  border: none;
  cursor: pointer;
}
  
</style>
  
  
</head>

<body>

<div id="content" style="display:none;">

  <div class="header">Header</div>

  <div class="top-links">Hyper links (parkert)</div>

  <div class="main">

    <!-- VENSTRE -->
    <div class="sidebar">
      <h3>Rom</h3>
      <button onclick="velgRom('Oslo 1')">Oslo 1</button>
      <button onclick="velgRom('Oslo 2')">Oslo 2</button>
      <button onclick="velgRom('Oslo 3')">Oslo 3</button>
      <button onclick="velgRom('Oslo 4')">Oslo 4</button>
      <button onclick="velgRom('Styret')">Styret</button>
    </div>

    <!-- HØYRE -->
    <div class="content-area">

      <div class="calendar-actions">
        Funksjonsknapper for kalender
      </div>

      <div id="calendar"></div>

    </div>

  </div>

</div>



<script>

let currentRoom = "Oslo 1";
let calendar;

document.addEventListener('DOMContentLoaded', function() {

  calendar = new FullCalendar.Calendar(
    document.getElementById('calendar'),
    {
      initialView: 'dayGridMonth',

      events: function(fetchInfo, successCallback) {

        fetch("bookings.json")
          .then(res => res.json())
          .then(data => {

            let filtrert = data.filter(e => e.room === currentRoom);

            successCallback(filtrert);

          });

      }

    }
  );

  calendar.render();

});

function velgRom(room){
  currentRoom = room;
  
  // fjern aktiv fra alle
  document.querySelectorAll('.sidebar button')
    .forEach(btn => btn.classList.remove('active'));

  // sett aktiv på valgt
  event.target.classList.add('active');

  calendar.refetchEvents();
}


// tilgangskode
if(localStorage.getItem("access") === "yes"){
  document.getElementById("content").style.display = "block";
}
else{
  let kode = prompt("Skriv tilgangskode");

  if(kode === "K5A"){
    localStorage.setItem("access","yes");
    document.getElementById("content").style.display = "block";
  }
  else{
    document.body.innerHTML = "Ingen tilgang";
  }
}

</script>

</body>
</html>

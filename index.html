<!DOCTYPE html>
<html>
<head>
<title>Room Booking K5A</title>

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>


<style>

body {
  margin: 0;
  font-family: Arial;
}

.header {
  background: #2a8fb0;
  color: white;
  padding: 15px;
  text-align: center;
}

.top-links {
  background: #1f5d75;
  color: white;
  padding: 10px;
  text-align: center;
}

.main {
  display: flex;
  height: calc(100vh - 100px);
}

.sidebar {
  width: 200px;
  background: #4fa52b;
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.content-area {
  flex: 1;
  padding: 10px;
  background: #e76f2e;
  display: flex;
  flex-direction: column;
}

.calendar-actions {
  background: #e76f2e;
  padding: 10px;
  margin-bottom: 10px;
}

#calendar {
  background: white;
  flex: 1;
}

.sidebar button {
  padding: 10px;
  border: none;
  cursor: pointer;
}
  body {
  margin: 0;
  font-family: Arial;
  background: #eef1f5;
}

.app {
  max-width: 1200px;
  margin: 30px auto;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

/* HEADER */
.header {
  background: linear-gradient(to right, #2f4f6f, #3f6f9c);
  color: white;
  padding: 20px;
  text-align: center;
  font-size: 24px;
}

.header {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

.title {
  font-size: 28px;
}

.logo {
  position: absolute;
  right: 20px;
  height: 25px;
}
  
/* NAV */
.nav {
  background: #f1f3f6;
  padding: 10px 20px;
  display: flex;
  gap: 20px;
}

.nav span {
  cursor: pointer;
  color: #555;
}

.nav .active {
  border-bottom: 2px solid #5f7ea6;
}

/* MAIN */
.main {
  display: flex;
}

/* SIDEBAR */
.sidebar {
  width: 220px;
  background: #f7f8fa;
  padding: 15px;
}

.sidebar button {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
  border: none;
  background: #e3e6ea;
  cursor: pointer;
  border-radius: 5px;
}

.sidebar button.active {
  background: #5f7ea6;
  color: white;
}

/* CONTENT */
.content {
  flex: 1;
  padding: 20px;
  background: #ffffff;
}

/* TOOLBAR */
.toolbar {
  margin-bottom: 10px;
}

.toolbar button {
  padding: 8px 12px;
  margin-right: 5px;
  border: none;
  background: #5f7ea6;
  color: white;
  border-radius: 4px;
  cursor: pointer;
}

/* CALENDAR */
#calendar {
  background: white;
}
  
  
</style>
  
  
</head>

<body>

<div class="app">

<div class="header">
  <span>Room Booking K5A</span>
  <img src="HAB-Dragados Logo.png" class="logo">
</div>

  <div class="nav">
    <span class="active">Oversikt</span>
    <span>Uke</span>
    <span>Settings</span>
  </div>

  <div class="main">

    <!-- SIDEBAR -->
    <div class="sidebar">
      <h3>Rom</h3>
      
      <a href="mailto:booking@firma.no?subject=Rombooking Rom_K5A_1.1&body=MØTE_NAVN:%0D%0AROM: Rom_K5A_1.1%0D%0AFRA:%0D%0ATIL:%0D%0ATYPE:%0D%0AREPETER:">
       <button class="active">Rom_K5A_1.1</button>
        </a>
      
      <button>Rom_K5A_1.2</button>
      <button>Rom_K5A_2.1</button>
      <button>Rom_K5A_2.2</button>
      <button>Rom_K5A_2.3</button>
    </div>

    <!-- CONTENT -->
    <div class="content">

    

      <div id="calendar"></div>

    </div>

  </div>

</div>



<script>
<!-- kalender -->
let currentRoom = "Rom_K5A_1.1";
let calendar;

document.addEventListener('DOMContentLoaded', function() {

  calendar = new FullCalendar.Calendar(
    document.getElementById('calendar'),
    {
      initialView: 'timeGridWeek',
        headerToolbar: {
          left: 'prev,next today',
          center: 'title',
          right: 'dayGridMonth,timeGridWeek'
         },
      
      events: function(fetchInfo, successCallback) {

        fetch("bookings.json")
          .then(res => res.json())
          .then(data => {

            let filtrert = data.filter(e => e.room === currentRoom);

            let medFarger = filtrert.map(e => {

  if(e.room === "Rom_K5A_1.1") e.color = "#4a6fa5";
  if(e.room === "Rom_K5A_1.2") e.color = "#6c9bcf";
  if(e.room === "Rom_K5A_2.1") e.color = "#8bb174";
  if(e.room === "Rom_K5A_2.2") e.color = "#f4a261";
  if(e.room === "Rom_K5A_2.3") e.color = "#e76f51";

  return e;
});

successCallback(medFarger);

          });

      }

    }
  );

  calendar.render();

});

function velgRom(room){
  currentRoom = room;
  
  // fjern aktiv fra alle
  document.querySelectorAll('.sidebar button')
    .forEach(btn => btn.classList.remove('active'));

  // sett aktiv på valgt
  event.target.classList.add('active');

  calendar.refetchEvents();
}


// tilgangskode
if(localStorage.getItem("access") === "yes"){
  document.getElementById("content").style.display = "block";
}
else{
  let kode = prompt("Skriv tilgangskode");

  if(kode === "K5A"){
    localStorage.setItem("access","yes");
    document.getElementById("content").style.display = "block";
  }
  else{
    document.body.innerHTML = "Ingen tilgang";
  }
}

</script>

</body>
</html>

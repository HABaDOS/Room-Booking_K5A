<!DOCTYPE html>
<html>
<head>
<title>Room Booking K5A</title>
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
</head>

<body>

<div id="content" style="display:none;">

<h1>Room Booking K5A</h1>
<div id="calendar"></div>

</div>

  <h2>Romoversikt</h2>

<div class="room">
  <h3>Oslo 1</h3>
  <p>Status: Ledig</p>
  <a href="mailto:booking@firma.no?subject=Rombooking Oslo 1&body=NAVN:%0D%0AROM: Oslo 1%0D%0AFRA:%0D%0ATIL:%0D%0ATYPE:%0D%0AREPETER:">
<button>Book rom</button>
</a>
</div>

<div class="room">
  <h3>Oslo 2</h3>
  <p>Status: Ledig</p>
  <a href="mailto:booking@firma.no?subject=Rombooking Oslo 2&body=NAVN:%0D%0AROM: Oslo 2%0D%0AFRA:%0D%0ATIL:%0D%0ATYPE:%0D%0AREPETER:">
<button>Book rom</button>
</a>
</div>

<div class="room">
  <h3>Styret</h3>
  <p>Status: Ledig</p>
  <a href="mailto:booking@firma.no?subject=Rombooking Styret&body=NAVN:%0D%0AROM: Styret%0D%0AFRA:%0D%0ATIL:%0D%0ATYPE:%0D%0AREPETER:">
<button>Book rom</button>
</a>
</div>
  
<script>

  
document.addEventListener('DOMContentLoaded', function() {

  var calendar = new FullCalendar.Calendar(
    document.getElementById('calendar'),
    {
      initialView: 'dayGridMonth',

      events: 'bookings.json' // ← henter data herfra

    }
  );

  calendar.render();

});


if(localStorage.getItem("access") === "yes"){
  document.getElementById("content").style.display = "block";
}
else{
  let kode = prompt("Skriv tilgangskode");

  if(kode === "K5A"){
    localStorage.setItem("access","yes");
    document.getElementById("content").style.display = "block";
  }
  else{
    document.body.innerHTML = "Ingen tilgang";
  }
}

</script>

</body>
</html>
